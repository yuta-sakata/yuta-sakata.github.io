<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 388" width="520" height="388">

  <!-- 虚拟机区域 -->
  <rect x="36" y="8" width="448" height="158" rx="7" fill="#101c30" stroke="#2a4a7f" stroke-width="1.2"/>
  <text x="260" y="28" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4a6890" letter-spacing="2">虚拟机（运行在用户态）</text>

  <!-- VM1 -->
  <rect x="52" y="36" width="130" height="118" rx="6" fill="#0a1520" stroke="#1e3a60" stroke-width="1"/>
  <text x="117" y="54" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4a6890" letter-spacing="1">虚拟机 1</text>
  <rect x="64" y="62" width="106" height="30" rx="4" fill="#0c1828" stroke="#1e3a60" stroke-width="1"/>
  <text x="117" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7aaae0">应用程序</text>
  <rect x="64" y="98" width="106" height="30" rx="4" fill="#0f1e38" stroke="#2a5a9f" stroke-width="1"/>
  <text x="117" y="113" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#70b0f0">客户操作系统</text>
  <text x="117" y="126" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3a6090">Guest OS</text>

  <!-- VM2 -->
  <rect x="195" y="36" width="130" height="118" rx="6" fill="#0a1520" stroke="#1e3a60" stroke-width="1"/>
  <text x="260" y="54" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4a6890" letter-spacing="1">虚拟机 2</text>
  <rect x="207" y="62" width="106" height="30" rx="4" fill="#0c1828" stroke="#1e3a60" stroke-width="1"/>
  <text x="260" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7aaae0">应用程序</text>
  <rect x="207" y="98" width="106" height="30" rx="4" fill="#0f1e38" stroke="#2a5a9f" stroke-width="1"/>
  <text x="260" y="113" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#70b0f0">客户操作系统</text>
  <text x="260" y="126" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3a6090">Guest OS</text>

  <!-- VM3 -->
  <rect x="338" y="36" width="130" height="118" rx="6" fill="#0a1520" stroke="#1e3a60" stroke-width="1"/>
  <text x="403" y="54" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4a6890" letter-spacing="1">虚拟机 3</text>
  <rect x="350" y="62" width="106" height="30" rx="4" fill="#0c1828" stroke="#1e3a60" stroke-width="1"/>
  <text x="403" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7aaae0">应用程序</text>
  <rect x="350" y="98" width="106" height="30" rx="4" fill="#0f1e38" stroke="#2a5a9f" stroke-width="1"/>
  <text x="403" y="113" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#70b0f0">客户操作系统</text>
  <text x="403" y="126" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3a6090">Guest OS</text>

  <!-- Hypervisor -->
  <rect x="36" y="174" width="448" height="116" rx="7" fill="#160d28" stroke="#5020a0" stroke-width="1.4"/>
  <text x="260" y="194" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6030a0" letter-spacing="2">虚拟机管理程序（直接运行在硬件上）</text>

  <rect x="58"  y="204" width="120" height="56" rx="5" fill="#0f1e38" stroke="#2a5a9f" stroke-width="1"/>
  <text x="118" y="229" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#70b0f0">资源调度</text>
  <text x="118" y="247" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3a6090">CPU · 内存分配</text>

  <rect x="190" y="204" width="140" height="56" rx="5" fill="#1a0e30" stroke="#5030a0" stroke-width="1"/>
  <text x="260" y="229" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#b070f0">硬件虚拟化</text>
  <text x="260" y="247" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6040a0">隔离各虚拟机</text>

  <rect x="342" y="204" width="120" height="56" rx="5" fill="#0a1e14" stroke="#1a6030" stroke-width="1"/>
  <text x="402" y="229" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#50d080">设备模拟</text>
  <text x="402" y="247" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#286040">虚拟 I/O 设备</text>

  <!-- 硬件层 -->
  <rect x="36" y="298" width="448" height="56" rx="7" fill="#091410" stroke="#1a5030" stroke-width="1.2"/>
  <text x="260" y="316" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#206040" letter-spacing="2">物理硬件层</text>
  <rect x="58"  y="324" width="72" height="24" rx="4" fill="#061008" stroke="#1a4020" stroke-width="1"/>
  <text x="94"  y="341" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#40c070">CPU</text>
  <rect x="142" y="324" width="72" height="24" rx="4" fill="#061008" stroke="#1a4020" stroke-width="1"/>
  <text x="178" y="341" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#40c070">内存</text>
  <rect x="226" y="324" width="72" height="24" rx="4" fill="#061008" stroke="#1a4020" stroke-width="1"/>
  <text x="262" y="341" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#40c070">磁盘</text>
  <rect x="310" y="324" width="72" height="24" rx="4" fill="#061008" stroke="#1a4020" stroke-width="1"/>
  <text x="346" y="341" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#40c070">网卡</text>
  <rect x="394" y="324" width="72" height="24" rx="4" fill="#061008" stroke="#1a4020" stroke-width="1"/>
  <text x="430" y="341" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#40c070">外设</text>

  <text x="260" y="380" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2a3a50">Hypervisor 直接管理硬件，无需宿主操作系统</text>
</svg>
